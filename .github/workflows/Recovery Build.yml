name: Recovery Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'MANIFEST_URL'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp'
      MANIFEST_BRANCH:
        description: 'MANIFEST_BRANCH'
        required: true
        default: 'twrp-12.1'
      DEVICE_TREE_URL:
        description: 'DEVICE_TREE_URL'
        required: true
        default: 'https://github.com/shahvv-commits/android_device_doogee_P2TH'
      DEVICE_TREE_BRANCH:
        description: 'DEVICE_TREE_BRANCH'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'DEVICE_PATH'
        required: true
        default: 'device/doogee/P2TH'
      DEVICE_NAME:
        description: 'DEVICE_NAME'
        required: true
        default: 'P2TH'
      MAKEFILE_NAME:
        description: 'MAKEFILE_NAME'
        required: true
        default: 'omni_P2TH'
      BUILD_TARGET:
        description: 'BUILD_TARGET'
        required: true
        default: 'vendorbootimage'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Cleanup
        uses: rokibhasansagar/slimhub_actions@main

      - name: Prepare environment
        run: |
          sudo apt update
          sudo apt install -y gperf gcc-multilib g++-multilib lib32ncurses-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc bc liblz4-tool build-essential python3

      - name: Install OpenJDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Install repo
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Initialize repo
        run: |
          mkdir workspace
          cd workspace
          git config --global user.name "Nico170420"
          git config --global user.email "b170420nc@gmail.com"
          repo init --depth=1 -u ${{ github.event.inputs.MANIFEST_URL }} -b ${{ github.event.inputs.MANIFEST_BRANCH }}
          repo sync -j$(nproc --all) --force-sync

      - name: Clone device tree
        run: |
          git clone ${{ github.event.inputs.DEVICE_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} workspace/${{ github.event.inputs.DEVICE_PATH }}

      - name: Set Swap
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Building recovery
        run: |
          cd workspace
          
          # --- FORCE REPAIR PATHS ---
          # 1. Physically find the core files anywhere in the tree
          ACTUAL_PRODUCT_PATH=$(find . -maxdepth 5 -name "core_64bit.mk" | sed 's/\/core_64bit.mk//' | head -n 1)
          echo "Found product files at: $ACTUAL_PRODUCT_PATH"
          
          # 2. Create the target structure manually
          mkdir -p build/make/target/product
          
          # 3. Copy files to satisfy the Makefile inheritance
          if [ ! -z "$ACTUAL_PRODUCT_PATH" ]; then
            cp -v $ACTUAL_PRODUCT_PATH/*.mk build/make/target/product/
          fi
          
          # 4. Neutralize the gatekeeper checks
          # We use a broader search to ensure we hit the right file
          find build/
