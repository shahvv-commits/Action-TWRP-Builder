name: Recovery Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp'
      MANIFEST_BRANCH:
        default: 'twrp-12.1'
      DEVICE_TREE_URL:
        default: 'https://github.com/shahvv-commits/android_device_doogee_P2TH'
      DEVICE_TREE_BRANCH:
        default: 'main'
      DEVICE_PATH:
        default: 'device/doogee/P2TH'
      DEVICE_NAME:
        default: 'P2TH'
      MAKEFILE_NAME:
        default: 'omni_P2TH'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Cleanup
        uses: rokibhasansagar/slimhub_actions@main

      - name: Prepare environment
        run: |
          sudo apt update
          sudo apt install -y gperf gcc-multilib g++-multilib lib32ncurses-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc bc liblz4-tool build-essential python3

      - name: Install OpenJDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Install repo
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Initialize repo
        run: |
          mkdir workspace
          cd workspace
          git config --global user.name "Nico170420"
          git config --global user.email "b170420nc@gmail.com"
          repo init --depth=1 -u ${{ github.event.inputs.MANIFEST_URL }} -b ${{ github.event.inputs.MANIFEST_BRANCH }}
          repo sync -j$(nproc --all) --force-sync

      - name: Clone device tree
        run: |
          git clone ${{ github.event.inputs.DEVICE_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} workspace/${{ github.event.inputs.DEVICE_PATH }}

      - name: Set Swap
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Building recovery
        run: |
          cd workspace
          
          # 1. Bypass Gatekeeper Error
          find build/make/core/ -type f -name "*.mk" | xargs -I@ sed -i 's/$(error Should not set BOARD_MOVE_RECOVERY_RESOURCES_TO_VENDOR_BOOT/# Bypassed/g' @
          
          # 2. Setup Environment Variables
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          
          # 3. Explicitly force the target directory path
          export SRC_TARGET_DIR=$(pwd)/build/make/target
          
          # 4. Lunch and Build
          lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng
          mka recoveryimage vendorbootimage -j$(nproc --all)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-P2TH-Images
          path: |
            workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.img
          if-no-files-found: error
